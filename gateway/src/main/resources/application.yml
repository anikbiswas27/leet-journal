spring:
  application:
    name: gateway
  security:
    oauth2:
      client:
        registration:
          spring:
            provider: spring
            client-id: client
            client-secret: secret
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_basic
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - "user.read"
              - "openid"
        provider:
          spring:
            issuer-uri: ${AUTH_SERVER_URI:http://localhost:8000}
server:
  port: 9000
logging:
  level:
    org:
      springframework:
        security: TRACE
